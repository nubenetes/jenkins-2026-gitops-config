# The authoritative manifest is argocd/microservices-project.yaml in the infra
# repo (https://github.com/nubenetes/jenkins-2026), applied by its
# scripts/08.5-argocd.sh. Nothing consumes this copy; it exists for reader
# context only and may lag the deployed version.
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: microservices
  namespace: argocd
spec:
  description: "Modernized Microservices GitOps Project"
  sourceRepos:
    - "*"
  destinations:
    - namespace: microservices
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  # Allow all namespaced resources
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
