# ============================================================================
# NON-AUTHORITATIVE REFERENCE COPY — do NOT edit or deploy from this file.
# The authoritative manifest is argocd/microservices-appset.yaml in the infra
# repo (https://github.com/nubenetes/jenkins-2026), rendered and applied by
# its scripts/08.5-argocd.sh. The generated Application DOES source this
# repo's helm/microservices chart — but not this file. Nothing consumes this
# copy; it exists for reader context only and may lag the deployed version.
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: microservices
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: stable
            namespace: microservices
            valuesFile: values-stable.yaml
            branch: '{{branchStable}}'
  template:
    metadata:
      name: 'microservices-{{env}}'
    spec:
      project: microservices
      source:
        repoURL: '{{repoUrl}}'
        targetRevision: '{{branch}}'
        path: helm/microservices
        helm:
          valueFiles:
            - '{{valuesFile}}'
          parameters:
            - name: global.platform
              value: '{{platform}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
