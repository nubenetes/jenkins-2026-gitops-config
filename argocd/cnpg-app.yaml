# ============================================================================
# NON-AUTHORITATIVE REFERENCE COPY — do NOT edit or deploy from this file.
# SUPERSEDED: the standalone cnpg-operator Application no longer exists; the
# CNPG operator is now installed by the platform-postgres app-of-apps in the
# infra repo (https://github.com/nubenetes/jenkins-2026,
# argocd/platform-postgres/ — which also carries the current chart pin),
# applied by its scripts/08.5-argocd.sh. Nothing consumes this copy; it exists
# for reader context only.
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: argocd
spec:
  project: default
  source:
    chart: cloudnative-pg
    repoURL: https://cloudnative-pg.github.io/charts
    targetRevision: 0.28.3
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
