# ============================================================================
# NON-AUTHORITATIVE REFERENCE COPY — do NOT edit or deploy from this file.
# The authoritative manifest is argocd/headlamp-app.yaml in the infra repo
# (https://github.com/nubenetes/jenkins-2026), rendered and applied by its
# scripts/08.5-argocd.sh. Nothing (ArgoCD or any script) consumes this copy;
# it exists for reader context only and may lag the deployed version
# (e.g. the chart pin below).
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
spec:
  project: default
  sources:
    # Source 1: The official Helm chart from kubernetes-sigs repo
    - repoURL: https://kubernetes-sigs.github.io/headlamp
      chart: headlamp
      targetRevision: 0.42.0
      helm:
        valueFiles:
          - $values/helm/headlamp/values.yaml
    # Source 2: This Git repository containing the values file
    - repoURL: '{{repoUrl}}'
      targetRevision: '{{branchStable}}'
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: headlamp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
