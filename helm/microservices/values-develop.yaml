# =============================================================================
# "develop" environment - tracks the `develop` branch.
# =============================================================================

global:
  platform: gke
  # Lean tier — develop needs only what it needs, not HA. Single Postgres instance
  # (no standbys), single PgBouncer pooler, and no Barman/ScheduledBackup (develop
  # data is disposable). Stable keeps the defaults (3 / 3 / backups-on).
  postgresInstances: 1
  poolerInstances: 1
  postgresBackupEnabled: false
namespace: microservices-develop
env: develop
# Recreate (not RollingUpdate): the lean tier's single PgBouncer pooler runs
# session-mode pooling (default_pool_size 20) and one Java app holds ~20 server
# connections; overlapping old+new pods during a rolling update starve the new
# pod of DB connections, hanging its r2dbc health check -> CrashLoop. See
# templates/deployment.yaml. Stable omits this and keeps RollingUpdate.
deploymentStrategy: Recreate
registry: ghcr.io/nubenetes/jenkins-2026-microservices
imagePullSecret: ghcr-credentials
otel:
  collectorEndpoint: http://otel-collector-gateway.observability.svc.cluster.local:4317
ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""
services:
  gateway:
    type: java
    image:
      repository: gateway
      tag: develop-2
    port: 8080
    healthPath: /management/health
    resources:
      requests: {cpu: 100m, memory: 384Mi}
      # CPU limit is a burst ceiling, not a reservation (request stays lean at 100m).
      # 500m throttled the JHipster + OTel-agent cold start so hard it never bound its
      # port inside the startup probe window -> CrashLoop. 1500m lets the boot burst on
      # the (mostly idle) node, then it idles back to ~10m. Memory stays 768Mi.
      limits: {cpu: 1500m, memory: 768Mi}
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: prod,api-docs
      - name: MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED
        value: "true"
      - name: SPRING_CLOUD_CONSUL_ENABLED
        value: "false"
      - name: SPRING_CLOUD_CONSUL_CONFIG_ENABLED
        value: "false"
      - name: JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET
        value: "bXktc2VjcmV0LWtleS13aGljaC1zaG91bGQtYmUtY2hhbmdlZC1pbi1wcm9kdWN0aW9uLWFuZC1iZS1iYXNlNjQtZW5jb2RlZAo="
      - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
        value: "always"
      - name: SPRING_APPLICATION_JSON
        value: '{"spring":{"cloud":{"gateway":{"routes":[{"id":"jhipstersamplemicroservice","uri":"http://jhipstersamplemicroservice:8081","predicates":["Path=/services/jhipstersamplemicroservice/**"],"filters":["RewritePath=/services/jhipstersamplemicroservice/(?<remaining>.*), /${remaining}"]}]}}}}'
  jhipstersamplemicroservice:
    type: java
    image:
      repository: jhipstersamplemicroservice
      tag: develop-1
    port: 8081
    healthPath: /management/health
    resources:
      requests: {cpu: 100m, memory: 384Mi}
      # See gateway above: 500m starved the cold start; 1500m is a burst ceiling only.
      limits: {cpu: 1500m, memory: 768Mi}
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: prod,api-docs
      - name: MANAGEMENT_METRICS_EXPORT_PROMETHEUS_ENABLED
        value: "true"
      - name: SPRING_CLOUD_CONSUL_ENABLED
        value: "false"
      - name: SPRING_CLOUD_CONSUL_CONFIG_ENABLED
        value: "false"
      - name: JHIPSTER_SECURITY_AUTHENTICATION_JWT_BASE64_SECRET
        value: "bXktc2VjcmV0LWtleS13aGljaC1zaG91bGQtYmUtY2hhbmdlZC1pbi1wcm9kdWN0aW9uLWFuZC1iZS1iYXNlNjQtZW5jb2RlZAo="
      - name: MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS
        value: "always"
