{{- range $name, $svc := .Values.services }}
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-{{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/name: postgres-{{ $name }}
    {{- include "microservices.labels" $ | nindent 4 }}
spec:
  # Exclude the CNPG-managed Postgres pods from Cloud Service Mesh sidecar injection: the
  # namespace-wide istio.io/rev label (scripts/08.85) would otherwise mesh the database and
  # break its replication + pooler mTLS hops. inheritedMetadata propagates to all resources.
  inheritedMetadata:
    annotations:
      sidecar.istio.io/inject: "false"
  # Pin the PostgreSQL image explicitly (instead of inheriting the CNPG operator's
  # floating default) so the database major/minor is reproducible and upgrades are
  # deliberate - matches the repo-wide "pin everything" policy. Override per-env via
  # global.postgresImage. Bump deliberately; CNPG validates major-version jumps.
  imageName: {{ $.Values.global.postgresImage | default "ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie" }}
  # HA replica count. Default 3 (primary + 2 standbys) for stable; the lean 'develop'
  # tier overrides global.postgresInstances: 1 (single instance, no standbys).
  instances: {{ $.Values.global.postgresInstances | default 3 }}

  # Zonal anti-affinity for high availability
  affinity:
    enablePodAntiAffinity: true
    topologyKey: topology.kubernetes.io/zone

  # Dynamic pod selection for security rules
  podSelectorRefs:
    - name: app-{{ $name }}
      selector:
        matchLabels:
          app.kubernetes.io/name: {{ $name }}

  # Write-Ahead Log (WAL) storage volume isolation
  walStorage:
    size: {{ if and $svc.postgres $svc.postgres.walStorageSize }}{{ $svc.postgres.walStorageSize }}{{ else }}1Gi{{ end }}
    storageClass: {{ $.Values.global.storageClass | default "premium-rwo" }}

  # Main PostgreSQL data storage volume
  storage:
    size: {{ if and $svc.postgres $svc.postgres.storageSize }}{{ $svc.postgres.storageSize }}{{ else }}1Gi{{ end }}
    storageClass: {{ $.Values.global.storageClass | default "premium-rwo" }}

  # Bootstrap database & user (credentials will be auto-generated in postgres-{{ $name }}-app secret)
  bootstrap:
    initdb:
      database: {{ $name }}
      owner: {{ $name }}

  # Superuser credentials secret configuration
  superuserSecret:
    name: postgres-{{ $name }}-superuser

  # Host-Based Authentication (pg_hba.conf) rules using pod selector refs
  postgresql:
    pg_hba:
      - local all all peer
      # Allow PgBouncer pooler connection using client certificates
      - hostssl all cnpg_pooler_pgbouncer all cert
      # Allow app pods in the same namespace matching selector
      - hostssl {{ $name }} {{ $name }} ${podselector:app-{{ $name }}} scram-sha-256
      # Allow pgAdmin (in pgadmin namespace) using cluster pod CIDR
      - hostssl {{ $name }} {{ $name }} 10.20.0.0/16 scram-sha-256
      # Reject all other host connections
      - host all all all reject

  # Prometheus operator metrics exporter
  monitoring:
    enablePodMonitor: true

  # GKE Workload Identity service account annotations
  serviceAccountTemplate:
    metadata:
      annotations:
        iam.gke.io/gcp-service-account: {{ $.Values.global.gcpServiceAccount | default "jenkins-2026-sa" }}@{{ $.Values.global.gcpProject | default "jenkins-2026" }}.iam.gserviceaccount.com

  {{- if ne $.Values.global.postgresBackupEnabled false }}
  # Native Barman backup configuration — WAL + base backups to GCS. Enabled by
  # default (stable); the lean 'develop' tier sets global.postgresBackupEnabled:
  # false (disposable data, no HA), which also drops the ScheduledBackup below.
  backup:
    barmanObjectStore:
      destinationPath: gs://{{ $.Values.global.gcsBackupBucket | default "jenkins-2026-postgres-backups" }}/{{ $name }}
      googleCredentials:
        gkeEnvironment: true
      wal:
        compression: gzip
  {{- end }}

{{- if ne $.Values.global.postgresBackupEnabled false }}
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: postgres-{{ $name }}-daily-backup
  namespace: {{ $.Values.namespace }}
spec:
  schedule: "0 0 0 * * *"
  cluster:
    name: postgres-{{ $name }}
  backupOwnerReference: self
  immediate: false
{{- end }}

---
apiVersion: postgresql.cnpg.io/v1
kind: Pooler
metadata:
  name: postgres-{{ $name }}-pooler
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/name: postgres-{{ $name }}-pooler
    {{- include "microservices.labels" $ | nindent 4 }}
spec:
  cluster:
    name: postgres-{{ $name }}
  # PgBouncer pooler replicas. Default 3 for stable; develop overrides
  # global.poolerInstances: 1 (the JDBC URL still points at the pooler Service).
  instances: {{ $.Values.global.poolerInstances | default 3 }}
  type: rw
  # Exclude the PgBouncer pooler pods from mesh injection (same reason as the Cluster
  # above). CNPG adds the pgbouncer container to this template.
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
  pgbouncer:
    poolMode: session
{{- end }}
