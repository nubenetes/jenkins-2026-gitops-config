{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "microservices.labels" $ | nindent 4 }}
spec:
  replicas: 1
  {{- if $.Values.deploymentStrategy }}
  # Recreate on the lean develop tier: PgBouncer runs session-mode pooling with
  # default_pool_size=20, and one Java instance (Hikari + R2DBC) holds ~20 server
  # connections for its whole life. A RollingUpdate runs the old + new pod at once,
  # so the new pod can get 0 connections -> its reactive r2dbc health indicator
  # hangs forever -> startup probe never passes -> CrashLoop. Recreate terminates
  # the old pod first, freeing its connections for the new one. Brief downtime is
  # fine for develop; stable keeps the default RollingUpdate (no value set there).
  strategy:
    type: {{ $.Values.deploymentStrategy }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        {{- include "microservices.labels" $ | nindent 8 }}
      annotations:
        {{- if eq $svc.type "java" }}
        # OTel Operator auto-instrumentation: injects the Java agent via an
        # init container, wired to the "microservices-java" Instrumentation CR
        # (templates/instrumentation.yaml) in this namespace.
        instrumentation.opentelemetry.io/inject-java: "true"
        {{- end }}
    spec:
      {{- if $.Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ $.Values.imagePullSecret }}
      {{- end }}
      {{- if eq $svc.type "java" }}
      volumes:
        - name: logback-config
          configMap:
            name: microservices-logback
        {{- if eq $name "gateway" }}
        - name: gateway-cache-patch
          configMap:
            name: gateway-cache-patch
            items:
              - key: CacheConfiguration.class
                path: CacheConfiguration.class
        {{- end }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.registry }}/{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          env:
            - name: OTEL_SERVICE_NAME
              value: {{ $name }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment={{ $.Values.env }},service.namespace=jenkins-2026"
            {{- if eq $svc.type "java" }}
            # Override the app's plain-text logback-spring.xml with the
            # ECS-JSON config mounted from the microservices-logback ConfigMap
            # (see templates/logback-configmap.yaml) so logs are structured.
            - name: LOGGING_CONFIG
              value: /etc/logback/logback.xml
            # Enable Reactor automatic context propagation so the OTel agent's
            # trace_id/span_id reach the logging MDC in reactive (WebFlux)
            # apps - without this the MDC is thread-local-only and stays empty
            # across Reactor operators, so logs carry no trace context and the
            # logs->traces correlation has nothing to link.
            - name: SPRING_REACTOR_CONTEXT_PROPAGATION
              value: "auto"
            {{- end }}
            {{- range $svc.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-{{ $name }}-pooler.{{ $.Values.namespace }}.svc:5432/{{ $name }}?ssl=true&sslmode=require"
            - name: SPRING_LIQUIBASE_URL
              value: "jdbc:postgresql://postgres-{{ $name }}-pooler.{{ $.Values.namespace }}.svc:5432/{{ $name }}?ssl=true&sslmode=require"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-{{ $name }}-app
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-{{ $name }}-app
                  key: password
            - name: SPRING_R2DBC_URL
              value: "r2dbc:postgresql://postgres-{{ $name }}-pooler.{{ $.Values.namespace }}.svc:5432/{{ $name }}?sslMode=require"
            - name: SPRING_R2DBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-{{ $name }}-app
                  key: username
            - name: SPRING_R2DBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-{{ $name }}-app
                  key: password
          {{- if eq $svc.type "java" }}
          # Probes use Spring Boot's DEDICATED health groups, not the aggregate
          # {{ $svc.healthPath }}: liveness = "is the JVM alive / not deadlocked"
          # (a transient DB/dependency blip must NOT restart the pod), readiness =
          # "can it serve traffic right now" (gets pulled from the Service instead).
          # Using the aggregate for liveness is an anti-pattern — a DB outage would
          # restart-loop every pod. Both groups verified present (200) on these
          # JHipster images (Spring AvailabilityProbes auto-enabled on Kubernetes).
          #
          # Slow cold start (Spring Boot + liquibase + the OTel Java agent): the
          # startupProbe holds off liveness/readiness for up to ~10min so the pod is
          # not killed mid-boot (the lean develop tier hit this as CrashLoop). 5min
          # was still too tight under CPU contention; 60x10s=10min absorbs it.
          startupProbe:
            httpGet:
              path: {{ $svc.healthPath }}/readiness
              port: http
            periodSeconds: 10
            failureThreshold: 60
          volumeMounts:
            - name: logback-config
              mountPath: /etc/logback
              readOnly: true
            {{- if eq $name "gateway" }}
            - name: gateway-cache-patch
              mountPath: /app/classes/io/github/jhipster/sample/config/CacheConfiguration.class
              subPath: CacheConfiguration.class
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          {{- if eq $svc.type "java" }}
          readinessProbe:
            httpGet:
              path: {{ $svc.healthPath }}/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: {{ $svc.healthPath }}/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
          {{- else }}
          readinessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            {{- if eq $.Values.global.platform "openshift" }}
            # Let the restricted-v2 SCC assign runAsUser/runAsGroup.
            {{- else }}
            runAsNonRoot: true
            # Explicit non-root UID/GID: the OTel Operator copies this
            # securityContext onto the injected
            # opentelemetry-auto-instrumentation-java init container, whose
            # image has no non-root USER - without an explicit runAsUser,
            # runAsNonRoot alone makes the kubelet reject that container
            # ("container has runAsNonRoot and image will run as root").
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
            {{- end }}
{{- end }}
