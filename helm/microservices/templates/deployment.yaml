{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "microservices.labels" $ | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        {{- include "microservices.labels" $ | nindent 8 }}
      annotations:
        {{- if eq $svc.type "java" }}
        # OTel Operator auto-instrumentation: injects the Java agent via an
        # init container, wired to the "microservices-java" Instrumentation CR
        # (templates/instrumentation.yaml) in this namespace.
        instrumentation.opentelemetry.io/inject-java: "true"
        {{- end }}
    spec:
      {{- if $.Values.imagePullSecret }}
      imagePullSecrets:
        - name: {{ $.Values.imagePullSecret }}
      {{- end }}
      {{- if eq $svc.type "java" }}
      volumes:
        - name: logback-config
          configMap:
            name: microservices-logback
        {{- if eq $name "gateway" }}
        - name: gateway-cache-patch
          configMap:
            name: gateway-cache-patch
            items:
              - key: CacheConfiguration.class
                path: CacheConfiguration.class
        {{- end }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.registry }}/{{ $svc.image.repository }}:{{ $svc.image.tag }}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          env:
            - name: OTEL_SERVICE_NAME
              value: {{ $name }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "deployment.environment={{ $.Values.env }},service.namespace=jenkins-2026"
            {{- if eq $svc.type "java" }}
            # Override the app's plain-text logback-spring.xml with the
            # ECS-JSON config mounted from the microservices-logback ConfigMap
            # (see templates/logback-configmap.yaml) so logs are structured.
            - name: LOGGING_CONFIG
              value: /etc/logback/logback.xml
            {{- end }}
            {{- range $svc.env }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://postgres-{{ $name }}-pooler.{{ $.Values.namespace }}.svc:5432/{{ $name }}?ssl=true&sslmode=require"
            - name: SPRING_LIQUIBASE_URL
              value: "jdbc:postgresql://postgres-{{ $name }}-pooler.{{ $.Values.namespace }}.svc:5432/{{ $name }}?ssl=true&sslmode=require"
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-{{ $name }}-app
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-{{ $name }}-app
                  key: password
            - name: SPRING_R2DBC_URL
              value: "r2dbc:postgresql://postgres-{{ $name }}-pooler.{{ $.Values.namespace }}.svc:5432/{{ $name }}?sslMode=require"
            - name: SPRING_R2DBC_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-{{ $name }}-app
                  key: username
            - name: SPRING_R2DBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-{{ $name }}-app
                  key: password
          {{- if eq $svc.type "java" }}
          volumeMounts:
            - name: logback-config
              mountPath: /etc/logback
              readOnly: true
            {{- if eq $name "gateway" }}
            - name: gateway-cache-patch
              mountPath: /app/classes/io/github/jhipster/sample/config/CacheConfiguration.class
              subPath: CacheConfiguration.class
            {{- end }}
          {{- end }}
          resources:
            {{- toYaml $svc.resources | nindent 12 }}
          {{- if eq $svc.type "java" }}
          readinessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 6
          {{- else }}
          readinessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ $svc.healthPath }}
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            {{- if eq $.Values.global.platform "openshift" }}
            # Let the restricted-v2 SCC assign runAsUser/runAsGroup.
            {{- else }}
            runAsNonRoot: true
            # Explicit non-root UID/GID: the OTel Operator copies this
            # securityContext onto the injected
            # opentelemetry-auto-instrumentation-java init container, whose
            # image has no non-root USER - without an explicit runAsUser,
            # runAsNonRoot alone makes the kubelet reject that container
            # ("container has runAsNonRoot and image will run as root").
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
            {{- end }}
{{- end }}
